<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Subtle shine overlay -->
  <rect x="32" y="32" width="448" height="224" rx="96" ry="96" fill="url(#shine)"/>

  <!-- Letter B - bold modern style -->
  <g transform="translate(256, 268)">
    <!-- B shape - outer -->
    <path d="M-72,-120 L-72,120 L20,120 C75,120 108,95 108,62 C108,35 90,14 60,6 C82,-2 96,-24 96,-48 C96,-82 68,-120 12,-120 Z"
          fill="#ffffff" fill-opacity="0.95"/>
    <!-- B cutout top -->
    <path d="M-28,-80 L12,-80 C38,-80 52,-65 52,-48 C52,-30 38,-16 12,-16 L-28,-16 Z"
          fill="url(#bg)"/>
    <!-- B cutout bottom -->
    <path d="M-28,22 L20,22 C50,22 64,38 64,58 C64,78 50,82 20,82 L-28,82 Z"
          fill="url(#bg)"/>
  </g>

  <!-- Small tech accent dots -->
  <circle cx="390" cy="130" r="6" fill="#64B5F6" opacity="0.8"/>
  <circle cx="410" cy="155" r="4" fill="#64B5F6" opacity="0.5"/>
  <circle cx="122" cy="390" r="5" fill="#90CAF9" opacity="0.4"/>
</svg>
